# Spotify RecSys Config

project:
  name: "Spotify Track Recommendation Engine"
  version: "0.1.0"

data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  test_size: 0.2
  random_state: 42

model:
  # Content-Based
  cb_model: "cosine_similarity"
  cb_features:
    - "valence"
    - "energy"
    - "danceability"
    - "acousticness"
    - "loudness"
    - "tempo"
  
  # Collaborative Filtering
  cf_model: "knn"
  cf_n_neighbors: 5
  
  # Hybrid Blend
  blend_weight_cb: 0.5
  blend_weight_cf: 0.5

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.01
  validation_split: 0.2

evaluation:
  metrics:
    - "precision@10"
    - "recall@10"
    - "ndcg@10"
    - "coverage"

output:
  model_path: "models/"
  results_path: "results/"
