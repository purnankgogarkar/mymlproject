# Example Configuration for Regression Problem
# Housing Dataset

data:
  path: data/housing.csv
  target: price
  test_size: 0.2
  random_state: 42

preprocessing:
  missing_value_strategy: mean
  encoding_method: auto
  scaling_method: standard
  outlier_method: iqr

feature_engineering:
  auto_generate: true
  transformations: [log, sqrt]
  interactions: true
  polynomials:
    enabled: true
    degree: 2

model:
  type: regression
  name: GradientBoosting
  hyperparams:
    n_estimators: 150
    learning_rate: 0.1
    max_depth: 7
    min_samples_split: 5

evaluation:
  cv_folds: 5
  metrics: [rmse, mae, r2]

mlflow:
  enabled: false
  experiment_name: housing_regression

optuna:
  enabled: false
