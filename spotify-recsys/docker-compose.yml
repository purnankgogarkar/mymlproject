version: '3.8'

services:
  spotify-recsys:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: spotify-recsys-streamlit
    
    ports:
      - "8501:8501"
    
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./notebooks:/app/notebooks
    
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_LOGGER_LEVEL=info
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: MLflow tracking server
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:latest
    
    container_name: mlflow-tracking-server
    
    ports:
      - "5000:5000"
    
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow-artifacts:/mlflow/artifacts
    
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlflow/mlruns --default-artifact-root /mlflow/artifacts
    
    restart: unless-stopped

volumes:
  mlruns:
  mlflow-artifacts:
